<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焦虑干预程序-主菜单</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑";}
        body {background: #f5f7fa; padding: 30px;}
        .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee;}
        .header .user-info {color: #666; font-size: 16px;}
        .header .btn {padding: 8px 16px; background: #67c23a; color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none;}
        .header .btn:hover {background: #5eba2f;}
        .count-tip {font-size: 18px; color: #e6a23c; font-weight: bold; margin-bottom: 30px;}
        .card-list {display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;}
        .card {height: 180px; background: white; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #333; cursor: pointer; transition: all 0.3s; text-decoration: none;}
        .card.unlocked {background: #e6f7ff; border: 2px solid #409eff;}
        .card.locked {background: #f5f5f5; color: #ccc; cursor: not-allowed; pointer-events: none; /* 关键：禁用点击事件，避免无效点击 */}
        .card.unlocked:hover {transform: translateY(-5px); box-shadow: 0 0 20px rgba(64,158,255,0.2);}
        .card.available {background: #fff; color: #333; cursor: pointer; /* 未解锁但次数足够，可点击 */}
        .card.available:hover {transform: translateY(-5px); box-shadow: 0 0 20px rgba(64,158,255,0.1);}
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info" id="userInfo"></div>
        <a href="collect.html" class="btn">查看已解锁内容</a>
    </div>
    <div class="count-tip">今日剩余翻卡次数：<span id="remainCount">2</span>次（每日限翻2张新卡，已解锁可无限回看）</div>
    <!-- 改为空容器，后续JS动态生成卡片 -->
    <div class="card-list" id="cardList"></div>

    <script>
        // ************************** 1. 卡片数据源（可自行增删/修改）**************************
        // 格式：{id: 序号, href: 跳转页面, text: 卡片文字}
        const cardData = [
            {id: 1, href: "card1.html", text: "小组作业焦虑"},
            {id: 2, href: "card2.html", text: "未来规划焦虑"},
            {id: 3, href: "card3.html", text: "学业任务焦虑"},
            {id: 4, href: "card4.html", text: "社交邀约焦虑"},
            {id: 5, href: "card5.html", text: "宿舍关系焦虑"},
            {id: 6, href: "card6.html", text: "情绪表达顾虑"},
            {id: 7, href: "card5.html", text: "独处适应困扰"},
            {id: 8, href: "card5.html", text: "自我缺点接纳"},
            {id: 9, href: "card5.html", text: "日常情绪感知"},
            {id: 10, href: "card5.html", text: "人际边界建立"},
            {id: 11, href: "card5.html", text: "自我关照忽视"},
            {id: 12, href: "card5.html", text: "生活节律梳理"}, // 保留6个示例，可自行修改
        ];

        // ************************** 2. 随机排序算法（Fisher-Yates 洗牌）**************************
        function shuffleArray(arr) {
            // 深拷贝避免修改原数组
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // ************************** 3. 核心规则：每日限翻2张 **************************
        function initCardRule() {
            // 获取今日日期（年-月-日）
            const today = new Date().toLocaleDateString();
            // 从浏览器获取历史数据：最后翻卡日期、今日次数、已解锁卡片
            const lastDate = localStorage.getItem('lastOpenDate') || '';
            let todayCount = Number(localStorage.getItem('todayOpenCount')) || 0;
            let unlockedCards = localStorage.getItem('unlockedCards') ? JSON.parse(localStorage.getItem('unlockedCards')) : [];

            // 若不是今日，重置次数为0
            if (lastDate !== today) {
                todayCount = 0;
                localStorage.setItem('lastOpenDate', today);
                localStorage.setItem('todayOpenCount', 0);
            }

            // 更新今日剩余次数
            const remainCount = 2 - todayCount;
            document.getElementById('remainCount').innerText = remainCount;

            // 随机排序卡片数据
            const shuffledCards = shuffleArray(cardData);
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = ''; // 清空容器

            // 遍历随机后的卡片，生成DOM并设置状态/点击事件
            shuffledCards.forEach(item => {
                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.href = item.href;
                card.innerText = item.text;
                cardList.appendChild(card);

                // 1. 已解锁卡片：亮色，点击直接跳转
                if (unlockedCards.includes(item.id)) {
                    card.className = 'card unlocked';
                    card.onclick = function() {
                        window.location.href = item.href;
                    };
                } 
                // 2. 未解锁但次数足够：可点击，跳转前更新次数和解锁状态
                else if (remainCount > 0) {
                    card.className = 'card available';
                    card.onclick = function() {
                        // 翻卡次数+1并保存
                        todayCount++;
                        localStorage.setItem('todayOpenCount', todayCount);
                        // 标记为已解锁并保存
                        unlockedCards.push(item.id);
                        localStorage.setItem('unlockedCards', JSON.stringify(unlockedCards));
                        // 跳转到对应卡片页
                        window.location.href = item.href;
                    };
                } 
                // 3. 未解锁且次数不足：灰色，禁用点击
                else {
                    card.className = 'card locked';
                }
            });
        }

        // 初始化用户信息和卡片规则
        window.onload = function() {
            // 显示组别+编号
            const group = localStorage.getItem('userGroup');
            const number = localStorage.getItem('userNumber');
            document.getElementById('userInfo').innerText = `当前用户：${group} - ${number}`;
            // 初始化翻卡规则和解锁状态（包含随机排序）
            initCardRule();
        };
    </script>
</body>
</html>
