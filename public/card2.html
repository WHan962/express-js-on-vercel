<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来规划焦虑-干预</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑";}
        body {background: #f5f7fa; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column;}
        .container {background: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 600px; max-width: 95%;}
        .container h2 {color: #333; margin-bottom: 30px; text-align: center;}
        .option-item {margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 16px; transition: all 0.2s;}
        .option-item:hover {border-color: #409eff; background: #f5faff;}
        .option-item.selected {border-color: #409eff; background: #e6f7ff; color: #409eff; font-weight: bold;}
        .desc-text, .intervene-text, .behavior-text {line-height: 1.8; color: #666; font-size: 16px; margin-bottom: 30px; text-align: left;}
        .behavior-text {
            background: #f0f8ff;
            padding: 15px;
            border-left: 3px solid #409eff;
            border-radius: 4px;
            margin-top: 15px;
        }
        .btn-group {display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap;}
        .btn {padding: 10px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; text-decoration: none; min-width: 120px; text-align: center;}
        .btn-next {background: #409eff; color: white;}
        .btn-next:hover {background: #337ecc;}
        .btn-back {background: #f5f5f5; color: #666;}
        .btn-back:hover {background: #eee;}
        .btn-finish {background: #67c23a; color: white;}
        .btn-finish:hover {background: #5eba2f;}
        .step-tip {color: #999; margin-bottom: 20px; text-align: center;}
        [disabled] {opacity: 0.6; cursor: not-allowed;}
    </style>
</head>
<body>
    <div class="container" id="step1">
        <div class="step-tip">步骤1/3：选择你的焦虑情况</div>
        <h2>未来规划焦虑</h2>
        <div class="option-item" 
             data-option="对考研就业都没有底气" 
             data-desc="当我担心考研没把握、就业没竞争力，不管选哪条路都看不到希望时，我会对着招聘信息发呆，连投简历的勇气都没有，这种感受像在迷雾中迷路，我真正害怕的是没有方向、一事无成。
<br>*你是否想过，自己每天的小努力，都是对抗迷茫的证据？" 
             data-intervene="从老师的角度看，我的焦虑其实是一直在和别人比进度，我看不到自己平时的努力和积累，也忽略了自己的优势，只是一味地盯着别人的脚步。"
             data-behavior="不妨试着花5分钟写下自己1个小优势（比如细心、坚持），再只关注“今天能做的1件小事”（如看1页考研书/改1份简历），不用想太远。">
            1. 对考研就业都没有底气
        </div>
        <div class="option-item" 
             data-option="感觉落后同学，怕被淘汰" 
             data-desc="当我担心身边的同学都有了明确规划，而我还在原地打转，会被同龄人彻底淘汰时，我会忍不住刷着朋友圈对比，这种感受像被远远甩在后面，我真正害怕的是被时代抛下、无人问津。<br>*你是否想过，每个人的成长节奏本就不同，这不是失败？" 
             data-intervene="从老师的角度看，我的焦虑其实是把暂时的迷茫当成了彻底的失败，我忘了成长本来就是一个不断试错、不断探索的过程，迷茫只是其中的一部分。"
             data-behavior="不妨试着关掉朋友圈1天，花10分钟写下“我想试试的1件小事”（如了解1个新行业），成长没有统一节奏，不用和别人比。">
            2. 感觉落后同学，怕被淘汰
        </div>
        <div class="btn-group">
            <a href="./主菜单页.html" class="btn btn-back">返回</a>
            <button class="btn btn-next" id="toStep2" disabled>下一步</button>
        </div>
    </div>

    <div class="container" id="step2" style="display: none;">
        <div class="step-tip">步骤2/3：查看你的焦虑描述</div>
        <h2>未来规划焦虑</h2>
        <p class="desc-text" id="descContent"></p>
        <div class="btn-group">
            <button class="btn btn-back" id="backToStep1">上一步</button>
            <button class="btn btn-next" id="toStep3">下一步</button>
        </div>
    </div>

    <div class="container" id="step3" style="display: none;">
        <div class="step-tip">步骤3/3：认知重构与微小行动</div>
        <h2>未来规划焦虑</h2>
        <p class="intervene-text" id="interveneContent"></p>
        <p class="behavior-text" id="behaviorContent">💡 微小行为建议：</p>
        <div class="btn-group">
            <button class="btn btn-back" id="backToStep2">上一步</button>
            <a href="./主菜单页.html" class="btn btn-finish">完成解锁，返回主菜单</a>
        </div>
    </div>

    <script>
        let selectedData = {option: '', desc: '', intervene: '', behavior: ''};
        const optionItems = document.querySelectorAll('.option-item');
        const toStep2Btn = document.getElementById('toStep2');

        optionItems.forEach(item => {
            item.addEventListener('click', function() {
                optionItems.forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                selectedData.option = this.dataset.option;
                selectedData.desc = this.dataset.desc;
                selectedData.intervene = this.dataset.intervene;
                selectedData.behavior = this.dataset.behavior;
                toStep2Btn.disabled = false;
            });
        });

        toStep2Btn.addEventListener('click', function() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('descContent').innerHTML = selectedData.desc;
        });

        document.getElementById('toStep3').addEventListener('click', function() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            document.getElementById('interveneContent').textContent = selectedData.intervene;
            document.getElementById('behaviorContent').innerHTML = `💡 微小行为建议：${selectedData.behavior}`;
            localStorage.setItem('card2Res', JSON.stringify(selectedData));
        });

        document.getElementById('backToStep1').addEventListener('click', function() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        });

        document.getElementById('backToStep2').addEventListener('click', function() {
            document.getElementById('step3').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        });
    </script>
</body>
</html>
